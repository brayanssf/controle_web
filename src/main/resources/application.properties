# Application
spring.application.name=controle-web
server.port=8080

# Database H2 (padrão)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:controledb}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=${JWT_SECRET:controle-web-secret-key-change-in-production-minimum-256-bits}
jwt.expiration=86400000

# Admin User
admin.email=${ADMIN_EMAIL:admin@controle.com}
admin.password=${ADMIN_PASSWORD:Admin@123}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html