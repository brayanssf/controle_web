<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Controle de Eventos</title>
    <link rel="stylesheet" href="/css/app.css">
</head>

<body>
    <div class="container" style="max-width: 500px; margin-top: 100px;">
        <div class="card">
            <h2>Cadastro</h2>
            <form id="cadastroForm" aria-label="Formulário de cadastro">
                <div class="form-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required aria-required="true"
                        placeholder="Seu nome completo" autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required aria-required="true"
                        placeholder="seu@email.com" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" required aria-required="true" minlength="6"
                        placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                    <small>A senha deve ter no mínimo 6 caracteres</small>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Cadastrar
                </button>
            </form>

            <p style="text-align: center; margin-top: 1rem;">
                Já tem conta? <a href="/login.html">Faça login</a>
            </p>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const btnSubmit = e.target.querySelector('button[type="submit"]');

            if (senha.length < 6) {
                mostrarAlerta('A senha deve ter no mínimo 6 caracteres', 'error');
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.textContent = 'Cadastrando...';

            try {
                const response = await requisicaoAPI('/api/autenticacao/registrar', {
                    method: 'POST',
                    body: JSON.stringify({ nome, email, senha })
                });

                localStorage.setItem('token', response.token);
                localStorage.setItem('dadosUsuario', JSON.stringify({
                    email: response.email,
                    nome: response.nome,
                    papel: response.papel
                }));

                window.location.href = '/eventos.html';
            } catch (error) {
                mostrarAlerta('Erro ao cadastrar. Email já pode estar em uso.', 'error');
                btnSubmit.disabled = false;
                btnSubmit.textContent = 'Cadastrar';
            }
        });
    </script>
</body>

</html>
